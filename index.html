<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIMO 2026 | OFFICIAL STORE</title>
    <style>
        :root { --primary: #00ffcc; --bg: #0a0a0a; --card: #1a1a1a; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding-bottom: 60px; }
        .logo-container { padding: 30px; text-align: center; background: #000; border-bottom: 2px solid var(--primary); box-shadow: 0 0 20px var(--primary); }
        .logo-text { font-size: 3rem; font-weight: 900; letter-spacing: 8px; text-shadow: 0 0 15px var(--primary); }
        .countdown-bar { background: #111; color: var(--primary); text-align: center; padding: 12px; font-weight: bold; border-bottom: 1px solid #333; }
        .main-content { display: flex; flex-wrap: wrap; padding: 20px; gap: 20px; justify-content: center; }
        .container { flex: 3; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .product-card { background: var(--card); border-radius: 20px; border: 1px solid #333; overflow: hidden; transition: 0.4s; text-align: center; }
        .product-card:hover { border-color: var(--primary); transform: scale(1.03); }
        
        /* معالجة الصور لضمان الظهور */
        .product-img { width: 100%; height: 220px; background: linear-gradient(45deg, #111, #222); display: flex; align-items: center; justify-content: center; font-size: 50px; }
        
        .cart-panel { flex: 1; min-width: 320px; background: #111; padding: 25px; border-radius: 20px; border: 1px solid var(--primary); height: fit-content; }
        .btn { background: var(--primary); color: black; padding: 12px; width: 90%; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin: 15px 0; }
        input, textarea { background: #222; border: 1px solid #444; color: white; padding: 12px; width: 90%; border-radius: 8px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="countdown-bar" id="countdown">Initializing Protocol 2026...</div>

<div class="logo-container">
    <div class="logo-text">KIMO</div>
    <div style="color:var(--primary); letter-spacing:3px;">RELOAD 2026 OFFICIAL</div>
</div>

<div class="main-content">
    <div class="container">
        <!-- منتج 1 بوقعه الرقمي المضمون -->
        <div class="product-card">
            <div class="product-img">⚡</div>
            <div style="padding:15px;">
                <h3>معالج K-Quantum</h3>
                <p style="color:gray">تقنية المعالجة الذرية لعام 2026</p>
                <p style="font-size:1.3rem; color:var(--primary)">450.00 د.ك</p>
                <button class="btn" onclick="addToCart('معالج K-Quantum', 450)">إضافة للسلة</button>
            </div>
        </div>

        <!-- منتج 2 بوقعه الرقمي المضمون -->
        <div class="product-card">
            <div class="product-img">👓</div>
            <div style="padding:15px;">
                <h3>نظارة K-Vision Pro</h3>
                <p style="color:gray">عالمك الافتراضي بأبعاد حقيقية</p>
                <p style="font-size:1.3rem; color:var(--primary)">290.00 د.ك</p>
                <button class="btn" onclick="addToCart('نظارة K-Vision Pro', 290)">إضافة للسلة</button>
            </div>
        </div>
    </div>

    <div class="cart-panel">
        <h3>🛒 السلة الذكية</h3>
        <div id="cart-items" style="border-bottom:1px solid #333; margin-bottom:10px;">السلة فارغة...</div>
        <h4>الإجمالي: <span id="total-price" style="color:var(--primary)">0</span> د.ك</h4>
        <button class="btn" onclick="alert('جاري معالجة طلبك رقم #TX2026')">تأكيد الطلب</button>

        <div style="margin-top:20px; border-top:1px solid #333; padding-top:15px;">
            <h4>📩 مراسلة الإدارة</h4>
            <input type="text" placeholder="الاسم الكامل">
            <textarea rows="2" placeholder="اكتب رسالتك هنا..."></textarea>
            <button class="btn" style="background:#333; color:white;">إرسال مشفر</button>
        </div>
    </div>
</div>

<script>
    let cart = []; let total = 0;
    const target = new Date("Jan 1, 2026 00:00:00").getTime();
    setInterval(() => {
        const now = new Date().getTime();
        const d = target - now;
        const days = Math.floor(d / (1000*60*60*24));
        const h = Math.floor((d%(1000*60*60*24))/(1000*60*60));
        const m = Math.floor((d%(1000*60*60))/(1000*60));
        const s = Math.floor((d%(1000*60))/1000);
        document.getElementById("countdown").innerText = `المتبقي على إطلاق 2026: ${days} يوم و ${h}:${m}:${s}`;
    }, 1000);

    function addToCart(n, p) {
        cart.push({n, p}); total += p;
        document.getElementById('cart-items').innerHTML = cart.map(i => `<p>✅ ${i.n} (${i.p} د.ك)</p>`).join('');
        document.getElementById('total-price').innerText = total;
    }
</script>
</body>
</html>
