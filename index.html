<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIMO 2026 | SECURE PAYMENT</title>
    <style>
        :root { --primary: #00ffcc; --bg: #0a0a0a; --card: #1a1a1a; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }
        header { padding: 20px; text-align: center; border-bottom: 2px solid var(--primary); background: #000; box-shadow: 0 0 20px var(--primary); }
        .main-content { display: flex; flex-wrap: wrap; padding: 20px; gap: 20px; }
        .container { flex: 3; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .product-card { background: var(--card); border-radius: 15px; border: 1px solid #333; overflow: hidden; text-align: center; transition: 0.3s; }
        .product-card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .product-img { width: 100%; height: 180px; object-fit: cover; }
        .cart-panel { flex: 1; min-width: 320px; background: #111; padding: 25px; border-radius: 15px; border-right: 4px solid var(--primary); height: fit-content; }
        
        /* واجهة الدفع المنبثقة */
        #payment-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: #1a1a1a; padding: 30px; border-radius: 15px; border: 1px solid var(--primary);
            width: 90%; max-width: 400px; text-align: center;
        }
        .loader {
            border: 4px solid #f3f3f3; border-top: 4px solid var(--primary);
            border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;
            margin: 20px auto; display: none;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        input { background: #222; border: 1px solid #444; color: white; padding: 12px; width: 90%; border-radius: 8px; margin-bottom: 10px; }
        .btn { background: var(--primary); color: black; padding: 12px; width: 100%; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <h1>KIMO RELOAD 2026</h1>
    <p>SECURE PAYMENT PROTOCOL: READY</p>
</header>

<div class="main-content">
    <div class="container">
        <div class="product-card">
            <img src="https://images.unsplash.com" class="product-img">
            <h3>بروتوكول K-01</h3>
            <p>150.00 د.ك</p>
            <button class="btn" style="width:80%; margin-bottom:15px;" onclick="addToCart('بروتوكول K-01', 150)">أضف للسلة</button>
        </div>
        <div class="product-card">
            <img src="https://images.unsplash.com" class="product-img">
            <h3>وحدة K-02</h3>
            <p>300.00 د.ك</p>
            <button class="btn" style="width:80%; margin-bottom:15px;" onclick="addToCart('وحدة K-02', 300)">أضف للسلة</button>
        </div>
    </div>

    <div class="cart-panel">
        <h3>🛒 السلة</h3>
        <div id="cart-items">فارغة...</div>
        <hr>
        <h4>الإجمالي: <span id="total-price">0</span> د.ك</h4>
        <button class="btn" onclick="openPayment()">تأكيد الشراء</button>
    </div>
</div>

<!-- مودال الدفع -->
<div id="payment-modal">
    <div class="modal-content">
        <h2 id="modal-title">بوابة الدفع المشفرة</h2>
        <div id="payment-form">
            <input type="text" placeholder="رقم البطاقة (16 رقم)">
            <div style="display:flex; gap:10px;">
                <input type="text" placeholder="MM/YY">
                <input type="text" placeholder="CVV">
            </div>
            <button class="btn" onclick="startProcess()">دفع الآن</button>
        </div>
        <div id="loader" class="loader"></div>
        <p id="status-msg"></p>
        <button id="close-btn" class="btn" style="display:none; background:#444; color:white;" onclick="closeModal()">إغلاق</button>
    </div>
</div>

<script>
    let cart = []; let total = 0;
    function addToCart(n, p) { cart.push({n, p}); total += p; updateUI(); }
    function updateUI() {
        document.getElementById('cart-items').innerHTML = cart.map(i => `<p>${i.n} - ${i.p} د.ك</p>`).join('');
        document.getElementById('total-price').innerText = total;
    }
    function openPayment() {
        if(cart.length === 0) return alert("السلة فارغة!");
        document.getElementById('payment-modal').style.display = 'flex';
    }
    function startProcess() {
        document.getElementById('payment-form').style.display = 'none';
        document.getElementById('loader').style.display = 'block';
        document.getElementById('status-msg').innerText = "جاري تشفير البيانات وتوصيل البروتوكول...";
        
        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('status-msg').innerHTML = "✅ تم الدفع بنجاح!<br>رقم العملية: #KIMO-2026-TX99";
            document.getElementById('close-btn').style.display = 'block';
            cart = []; total = 0; updateUI();
        }, 3000);
    }
    function closeModal() { document.getElementById('payment-modal').style.display = 'none'; location.reload(); }
</script>

</body>
</html>
